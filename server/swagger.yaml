      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Proposal' }

    post:
      tags: [Proposals]
      summary: Create a proposal
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Proposal' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Proposal' }

  /proposals/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Proposals]
      summary: Get a proposal
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Proposal' }
        '404':
          description: Not found

    put:
      tags: [Proposals]
      summary: Update a proposal
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Proposal' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Proposal' }

    delete:
      tags: [Proposals]
      summary: Delete a proposal
      responses:
        '204':
          description: Deleted

  # ════════════════════════════════════════════════════════════════════════════
  # VERSIONS
  # ════════════════════════════════════════════════════════════════════════════

  /proposals/{id}/versions:
    get:
      tags: [Versions]
      summary: List saved versions of a proposal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:         { type: string, format: uuid }
                    proposalId: { type: string, format: uuid }
                    savedBy:    { type: string }
                    savedAt:    { type: string, format: date-time }

  /proposals/{id}/versions/{vid}:
    get:
      tags: [Versions]
      summary: Get a specific version snapshot
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: vid
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Proposal' }

  /proposals/{id}/versions/{vid}/restore:
    post:
      tags: [Versions]
      summary: Restore a proposal to a previous version
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: vid
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Proposal' }

  # ════════════════════════════════════════════════════════════════════════════
  # SHARES
  # ════════════════════════════════════════════════════════════════════════════

  /proposals/{id}/share:
    post:
      tags: [Shares]
      summary: Create a shareable link for a proposal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                expiresAt: { type: string, format: date-time }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }

  /proposals/{id}/shares:
    get:
      tags: [Shares]
      summary: List active share links for a proposal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    token:     { type: string }
                    createdAt: { type: string, format: date-time }
                    expiresAt: { type: string, format: date-time }

  /share/{token}:
    get:
      tags: [Shares]
      summary: Get a shared proposal (public — no auth required)
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Proposal' }
        '404':
          description: Link not found or expired

    delete:
      tags: [Shares]
      summary: Revoke a share link
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Revoked

  # ════════════════════════════════════════════════════════════════════════════
  # TEMPLATES
  # ════════════════════════════════════════════════════════════════════════════

  /templates:
    get:
      tags: [Templates]
