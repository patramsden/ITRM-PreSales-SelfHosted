    put:
      tags: [Rate Cards]
      summary: Update a rate card
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RateCard' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RateCard' }

    delete:
      tags: [Rate Cards]
      summary: Delete a rate card
