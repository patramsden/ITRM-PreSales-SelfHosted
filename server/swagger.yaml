      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Template' }

    post:
      tags: [Templates]
      summary: Create a template
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Template' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Template' }

  /templates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    put:
      tags: [Templates]
      summary: Update a template
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Template' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Template' }

    delete:
      tags: [Templates]
      summary: Delete a template
      responses:
        '204':
          description: Deleted

  # ════════════════════════════════════════════════════════════════════════════
  # CATALOG
  # ════════════════════════════════════════════════════════════════════════════

  /catalog:
    get:
      tags: [Catalog]
      summary: List catalog items
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CatalogItem' }

    post:
      tags: [Catalog]
      summary: Create a catalog item
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CatalogItem' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CatalogItem' }

  /catalog/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    put:
      tags: [Catalog]
      summary: Update a catalog item
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CatalogItem' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CatalogItem' }

    delete:
      tags: [Catalog]
      summary: Delete a catalog item
      responses:
        '204':
          description: Deleted

  /catalog/import:
    post:
      tags: [Catalog]
      summary: Bulk import catalog items (upsert by SKU)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/CatalogItem' }
      responses:
