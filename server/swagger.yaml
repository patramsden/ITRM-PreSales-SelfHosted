  # ════════════════════════════════════════════════════════════════════════════
  # LOOKUPS
  # ════════════════════════════════════════════════════════════════════════════

  /lookups:
    get:
      tags: [Lookups]
      summary: Get dropdown lookup values
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppLookups' }

    put:
      tags: [Lookups]
      summary: Update lookup values (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AppLookups' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppLookups' }

  # ════════════════════════════════════════════════════════════════════════════
  # SOW
  # ════════════════════════════════════════════════════════════════════════════

  /sow/generate:
    post:
      tags: [SoW]
      summary: Generate a Statement of Work using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [proposal]
              properties:
                proposal: { $ref: '#/components/schemas/Proposal' }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  content: { type: string, description: Markdown SoW content }

  # ════════════════════════════════════════════════════════════════════════════
  # SETTINGS
  # ════════════════════════════════════════════════════════════════════════════

  /settings:
    get:
      tags: [Settings]
      summary: Get application settings
      description: Returns all settings. Write-only keys (secrets) are omitted; their `.configured` boolean indicators are returned instead.
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppSettings' }

    put:
      tags: [Settings]
      summary: Update application settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AppSettings' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppSettings' }

  /settings/service-key/status:
    get:
      tags: [Settings]
      summary: Check if a service API key is configured (admin only)
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured: { type: boolean }

  /settings/service-key:
    post:
      tags: [Settings]
      summary: Generate a new service API key (admin only)
      description: The key is returned once and never again. Store it securely.
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  serviceApiKey: { type: string }

    delete:
      tags: [Settings]
      summary: Revoke the service API key (admin only)
      responses:
        '204':
          description: Key revoked

  # ════════════════════════════════════════════════════════════════════════════
  # CRM
  # ════════════════════════════════════════════════════════════════════════════

  /crm/status:
    get:
      tags: [CRM]
      summary: Check if CRM credentials are configured
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured: { type: boolean }

  /crm/detect-zone:
    post:
      tags: [CRM]
      summary: Auto-detect Autotask zone URL from username (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username: { type: string, format: email }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  zoneUrl: { type: string, format: uri }

  /crm/test:
    post:
      tags: [CRM]
      summary: Test Autotask connection (admin only)
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:              { type: boolean }
                  message:              { type: string }
                  zoneUrl:              { type: string }
                  detectedZone:         { type: string }
                  username:             { type: string }
                  integrationCodeHint:  { type: string, description: 'First 4 + last 4 chars of the stored integration code' }

  /crm/companies:
    get:
      tags: [CRM]
      summary: Search Autotask companies
      parameters:
        - name: search
          in: query
          required: true
          schema: { type: string, minLength: 2 }
          description: Minimum 2 characters
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CrmCompany' }

  /crm/contacts:
    get:
      tags: [CRM]
      summary: Get contacts for an Autotask company
      parameters:
        - name: companyId
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CrmContact' }

  # ════════════════════════════════════════════════════════════════════════════
  # REPORT (Power BI / BI)
  # ════════════════════════════════════════════════════════════════════════════

  /report/proposals:
    get:
      tags: [Report]
      summary: Flat proposal rows for BI tooling
      description: |
        Returns one row per proposal with calculated financial totals.
        Requires an admin session token or a service API key.

        **Power BI setup:** Get Data → Web → Advanced. Add header:
        `Authorization: Bearer <service-api-key>`
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:               { type: string, format: uuid }
                    projectName:      { type: string }
                    client:           { type: string }
                    accountManager:   { type: string }
                    owner:            { type: string }
                    status:           { $ref: '#/components/schemas/ProposalStatus' }
                    currency:         { $ref: '#/components/schemas/Currency' }
                    ticketRef:        { type: string }
                    dateCreated:      { type: string, format: date-time }
                    dateModified:     { type: string, format: date-time }
                    partsCount:       { type: integer }
                    phasesCount:      { type: integer }
                    tasksCount:       { type: integer }
                    milestonesCount:  { type: integer }
                    partsCost:        { type: number }
                    partsSell:        { type: number }
                    markupAmount:     { type: number }
                    consultancyCost:  { type: number }
                    consultancySell:  { type: number }
                    grandTotal:       { type: number }
                    marginPct:        { type: number }
                    crmCompanyId:     { type: string }
                    clientContact:    { type: string }
        '401':
          description: Unauthorized

  /report/pipeline:
    get:
      tags: [Report]
      summary: Pipeline summary grouped by status
      description: Requires an admin session token or a service API key.
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  winRate:     { type: number, description: Win rate percentage }
                  generatedAt: { type: string, format: date-time }
                  summary:
                    type: array
                    items:
                      type: object
                      properties:
                        status:       { $ref: '#/components/schemas/ProposalStatus' }
                        count:        { type: integer }
                        totalValue:   { type: number }
                        avgValue:     { type: number }
                        avgMarginPct: { type: number }
        '401':
          description: Unauthorized

  # ════════════════════════════════════════════════════════════════════════════
  # SCIM 2.0
  # ════════════════════════════════════════════════════════════════════════════

  /scim/v2/ServiceProviderConfig:
    get:
      tags: [SCIM]
      summary: SCIM service provider capabilities
      security: []
      responses:
        '200':
          description: ServiceProviderConfig object
          content:
            application/scim+json:
              schema:
                type: object

  /scim/v2/Users:
    get:
      tags: [SCIM]
      summary: List or filter SCIM users
      security:
        - bearerAuth: []
      parameters:
        - name: filter
          in: query
          schema: { type: string }
          description: 'e.g. userName eq "user@example.com"'
      responses:
        '200':
          description: ListResponse
          content:
            application/scim+json:
              schema:
                type: object
                properties:
                  schemas:      { type: array, items: { type: string } }
                  totalResults: { type: integer }
                  startIndex:   { type: integer }
                  itemsPerPage: { type: integer }
                  Resources:    { type: array, items: { type: object } }
        '401':
          description: Unauthorized

    post:
      tags: [SCIM]
      summary: Provision a new user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              type: object
              required: [userName]
              properties:
                userName:    { type: string, format: email }
                displayName: { type: string }
                name:
                  type: object
                  properties:
                    givenName:  { type: string }
                    familyName: { type: string }
                active:      { type: boolean, default: true }
      responses:
        '201':
          description: User created
          content:
            application/scim+json:
              schema: { type: object }
        '401':
          description: Unauthorized

  /scim/v2/Users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [SCIM]
      summary: Get a SCIM user
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/scim+json:
              schema: { type: object }
        '404':
          description: Not found

    put:
      tags: [SCIM]
      summary: Replace a SCIM user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema: { type: object }
      responses:
        '200':
          content:
            application/scim+json:
              schema: { type: object }

    patch:
      tags: [SCIM]
      summary: Partially update a SCIM user (e.g. deactivate)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              type: object
              properties:
                Operations:
                  type: array
                  items:
                    type: object
                    properties:
                      op:    { type: string, enum: [add, replace, remove] }
                      path:  { type: string }
                      value: {}
      responses:
        '200':
          content:
            application/scim+json:
              schema: { type: object }

    delete:
      tags: [SCIM]
      summary: Deprovision a user (soft-delete / sets isActive=false)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deprovisioned
